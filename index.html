<!DOCTYPE html>
<html>

<head>

<title>Levers & Chest</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#1a1a1a;
color:white;
font-family:'Press Start 2P', monospace;
text-align:center;
}

.hero{

height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background-image:linear-gradient(#2b2b2b,#121212);
}

h1{
color:#ffd65c;
font-size:32px;
margin-bottom:20px;
}

.subtitle{
color:#ccc;
margin-bottom:40px;
}

.lever{

width:120px;
height:120px;
background:#444;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border:4px solid #777;

}

.lever:active{
transform:rotate(20deg);
}

.lever-stick{

width:12px;
height:80px;
background:red;
border-radius:4px;

}

.chest{

margin-top:40px;
width:260px;
height:140px;
background:#5c3b1e;
border:6px solid #b48a44;
border-radius:8px;

display:flex;
align-items:center;
justify-content:center;

font-size:12px;

}

.hidden{

display:none;

}

.panel{

padding:60px 20px;
background:#111;
border-top:6px solid #333;

}

.ca{

background:#000;
padding:20px;
margin-top:20px;
display:inline-block;
border:2px solid #666;
word-break:break-all;

}

button{

padding:14px 22px;
margin:10px;
border:none;
background:#ffd65c;
font-family:'Press Start 2P';
cursor:pointer;

}

button:hover{

background:#ffea8a;

}

.inventory{

margin-top:40px;
display:grid;
grid-template-columns:repeat(5,60px);
gap:10px;
justify-content:center;

}

.slot{

width:60px;
height:60px;
background:#222;
border:3px solid #555;

}

</style>

</head>

<body>


<div class="hero">

<h1>LEVERS & CHEST</h1>

<div class="subtitle">

Pull the lever. Open the chest.

</div>

<div class="lever" onclick="pullLever()">

<div class="lever-stick"></div>

</div>

<div id="chest" class="chest hidden">

Chest Opened

</div>

</div>


<div id="content" class="panel hidden">

<h2>The Game</h2>

<p>

A community hub following the mysterious development of
Levers & Chest.

</p>


<h2>Community Coin</h2>

<div class="ca">

DZjBpT8ddQom9GJXBqWNzcJQGw4ZE9RNVryzWcy5pump

</div>

<br>

<button onclick="window.open('https://x.com/i/communities/2029971730362487122')">

Join Community

</button>

<button onclick="window.open('https://github.com/xNotch')">

Support Notch

</button>


<div class="inventory">

<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>

<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>

</div>

</div>



<script>

function pullLever(){

document.getElementById("chest").classList.remove("hidden")

setTimeout(()=>{

document.getElementById("content").classList.remove("hidden")

},700)

}

</script>


</body>

</html>
