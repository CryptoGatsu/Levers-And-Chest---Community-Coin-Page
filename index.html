<!DOCTYPE html>
<html>

<head>

<title>Levers & Chest</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0e0e0e;
color:white;
font-family:'Press Start 2P', monospace;
overflow-x:hidden;
}

/* dungeon background */

body::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:

radial-gradient(circle at 20% 30%,rgba(255,140,0,0.15),transparent 40%),
radial-gradient(circle at 80% 40%,rgba(255,140,0,0.15),transparent 40%),

linear-gradient(#1a1a1a,#0b0b0b);

z-index:-1;

}

/* title */

h1{

text-align:center;
color:#ffd76a;
margin-top:60px;
font-size:36px;

}

.subtitle{

text-align:center;
color:#ccc;
margin-bottom:40px;

}

/* lever */

.lever-area{

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

}

.lever{

width:120px;
height:120px;
background:#444;
border-radius:12px;
border:4px solid #888;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:transform .3s;

}

.lever-stick{

width:14px;
height:90px;
background:red;
border-radius:5px;
transition:transform .4s;

}

.lever.pulled .lever-stick{

transform:rotate(45deg) translateY(20px);

}

/* chest */

.chest{

width:260px;
height:150px;
margin-top:40px;

background:

linear-gradient(#6a3f1d,#4b2c13);

border:6px solid #b78a3c;
border-radius:10px;

display:flex;
justify-content:center;
align-items:center;

font-size:12px;

box-shadow:0 0 0px gold;
transition:.6s;

}

.chest.open{

box-shadow:0 0 60px gold;

}

.hidden{

display:none;

}

/* gears */

.gear{

position:absolute;
width:120px;
height:120px;
border:10px solid #333;
border-radius:50%;
animation:spin 8s linear infinite;

}

.gear:before{

content:"";
position:absolute;
width:20px;
height:20px;
background:#333;
top:50%;
left:50%;
transform:translate(-50%,-50%);

}

.gear1{

left:40px;
top:200px;

}

.gear2{

right:60px;
top:260px;
animation-direction:reverse;

}

@keyframes spin{

from{transform:rotate(0deg)}
to{transform:rotate(360deg)}

}

/* panel */

.panel{

padding:80px 20px;
text-align:center;

}

.ca{

background:black;
padding:18px;
border:3px solid #666;
display:inline-block;
margin-top:20px;
word-break:break-all;

}

/* inventory */

.inventory{

margin-top:60px;
display:grid;
grid-template-columns:repeat(5,70px);
gap:10px;
justify-content:center;

}

.slot{

width:70px;
height:70px;
background:#222;
border:3px solid #555;

}

/* buttons */

button{

margin-top:20px;
padding:14px 24px;
border:none;
background:#ffd76a;
cursor:pointer;
font-family:'Press Start 2P';

}

button:hover{

background:#ffe8a6;

}

/* counter */

.counter{

margin-top:20px;
font-size:14px;
color:#ffd76a;

}

</style>

</head>

<body>

<div class="gear gear1"></div>
<div class="gear gear2"></div>

<h1>LEVERS & CHEST</h1>

<div class="subtitle">

Pull the lever. Open the chest.

</div>


<div class="lever-area">

<div class="lever" id="lever" onclick="pullLever()">

<div class="lever-stick"></div>

</div>

<div id="counter" class="counter">

Global Lever Pulls: 127,482

</div>

<div id="chest" class="chest hidden">

Treasure Revealed

</div>

</div>



<div id="content" class="panel hidden">

<h2>The Game</h2>

<p>

A mysterious new project from the creator of Minecraft.

</p>


<h2>Community Coin</h2>

<div class="ca">

DZjBpT8ddQom9GJXBqWNzcJQGw4ZE9RNVryzWcy5pump

</div>

<br>

<button onclick="window.open('https://x.com/i/communities/2029971730362487122')">

Join Community

</button>

<button onclick="window.open('https://github.com/xNotch')">

Support Notch

</button>


<h2>Inventory</h2>

<div class="inventory">

<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>

<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>

</div>


<h2>Coin Chart</h2>

<iframe

src="https://dexscreener.com/solana/DZjBpT8ddQom9GJXBqWNzcJQGw4ZE9RNVryzWcy5pump?embed=1"

width="100%"
height="500"

></iframe>

</div>



<script>

let pulls = 127482

function pullLever(){

document.getElementById("lever").classList.add("pulled")

pulls++

document.getElementById("counter").innerText =

"Global Lever Pulls: " + pulls

setTimeout(()=>{

document.getElementById("chest").classList.remove("hidden")
document.getElementById("chest").classList.add("open")

document.getElementById("content").classList.remove("hidden")

},500)

}

</script>

</body>

</html>
